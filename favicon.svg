<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- American Flag Favicon for Northeast Decorative Concrete, LLC -->
  <!-- White background -->
  <rect width="48" height="48" rx="4" fill="#fff"/>
  
  <!-- Red stripes (7 red stripes) -->
  <rect y="2" width="48" height="3.38" rx="1" fill="#B22234"/>
  <rect y="8.77" width="48" height="3.38" fill="#B22234"/>
  <rect y="15.54" width="48" height="3.38" fill="#B22234"/>
  <rect y="22.31" width="48" height="3.38" fill="#B22234"/>
  <rect y="29.08" width="48" height="3.38" fill="#B22234"/>
  <rect y="35.85" width="48" height="3.38" fill="#B22234"/>
  <rect y="42.62" width="48" height="3.38" rx="1" fill="#B22234"/>
  
  <!-- Blue canton (union) -->
  <rect x="0" y="2" width="20" height="23.07" rx="1" fill="#3C3B6E"/>
  
  <!-- Stars (simplified 3x3 grid for favicon clarity) -->
  <g fill="#fff">
    <!-- Row 1 -->
    <circle cx="4" cy="6" r="1.2"/>
    <circle cx="10" cy="6" r="1.2"/>
    <circle cx="16" cy="6" r="1.2"/>
    <!-- Row 2 -->
    <circle cx="7" cy="10" r="1.2"/>
    <circle cx="13" cy="10" r="1.2"/>
    <!-- Row 3 -->
    <circle cx="4" cy="14" r="1.2"/>
    <circle cx="10" cy="14" r="1.2"/>
    <circle cx="16" cy="14" r="1.2"/>
    <!-- Row 4 -->
    <circle cx="7" cy="18" r="1.2"/>
    <circle cx="13" cy="18" r="1.2"/>
    <!-- Row 5 -->
    <circle cx="4" cy="22" r="1.2"/>
    <circle cx="10" cy="22" r="1.2"/>
    <circle cx="16" cy="22" r="1.2"/>
  </g>
</svg>
